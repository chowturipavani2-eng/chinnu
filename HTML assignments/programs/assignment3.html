<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ DISPATCH</title>
    <style>
        table{
             border-collapse: collapse;
             width: 80%;
            margin: 40px auto;
            text-align: center;
        }
        th, td{border: 2px solid black;
            padding: 10px;
        }
        .title{
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<table>
        <caption><b>XYZ DISPATCH</b></caption>

        <tr>
        <th colspan="2" class="title">Schedule</th>
        <th colspan="3" class="title">Product</th>
        </tr>
        
        <tr>
            <th rowspan="2">Day</th>
            <th rowspan="2">Time</th>
            <th rowspan="2">Item</th>
            <th colspan="2">Shipping Details</th>
        </tr>

        <tr>
            <th>Quality</th>
            <th>Cost</th>
        </tr>

        <!--Monday-->
        <tr>
            <td rowspan="6">Monday</td>
            <td rowspan="3">10:00</td>
            <td>Bag</td>
            <td>10</td>
            <td rowspan="3">2000.00</td>
        </tr>
        <tr>
            <td>T-shirt</td>
            <td>10</td>
        </tr>
        <tr>
            <td>Notebook</td>
            <td>20</td>
        </tr>
        <tr>
            <td rowspan="2">1:00 PM</td>
            <td>T-shirt</td>
            <td>20</td>
            <td rowspan="2">1300.00</td>
        </tr>
        <tr>
            <td>Notebook</td>
            <td>15</td>
        </tr>
        <tr>
            <td>5:00 PM</td>
            <td>Bag</td>
            <td>8</td>
            <td>800.00</td>
        </tr>

        <!--Tuesday-->
        <tr>
            <td rowspan="5">Tuesday</td>
            <td rowspan="3">12:00 PM</td>
            <td>Bag</td>
            <td>8</td>
            <td rowspan="3">2100.00</td>
        </tr>
        <tr>
            <td>T-shirt</td>
            <td>12</td>
        </tr>
        <tr>
            <td>Notebook</td>
            <td>22</td>
        </tr>
        <tr>
            <td rowspan="2">1:00 PM</td>
            <td>T-shirt</td>
            <td>10</td>
            <td rowspan="2">600.00</td>
        </tr>
        <tr>
            <td>Notebook</td>
            <td>10</td>
        </tr>
</table>
    
</body>
</html>
